<style>
body {
  background:#1a1c23;

  font-family:Arial;

  padding:20px;
}

/* NAV */
nav {
  display:flex;
  justify-content:flex-end;
  gap:20px;
  margin-bottom:20px;
}

nav a {
  color:#c2a27c;
  text-decoration:none;
  padding:10px 14px;
  border:1px solid #3b2f2f;
  border-radius:20px;
}

nav a:hover {
  background:#3b2f2f;
}

/* CATEGORY */
#categories a {
  display:inline-block;
  margin:10px;
  padding:10px;
  border-radius:8px;
  text-decoration:none;
  background:#2a2d36;
  color:white;
}

#categories a.active {
  background:#ffd700;
  color:black;
}

/* TIERS LAYOUT */
.tiers {
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.tier {
  background:#2a2d36;
  border-radius:12px;
  padding:10px;
  width:220px;
}

/* Tier farver */
.tier1 h2 { background:#bfa23b; }
.tier2 h2 { background:#a0a0a0; }
.tier3 h2 { background:#8b5a2b; }
.tier4 h2 { background:#4a6c7b; }

.tier h2 {
  padding:8px;
  border-radius:8px;
}

/* PLAYERS (VERTIKAL) */
.player {
  display:flex;
  align-items:center;
  gap:10px;
  background:#1f222a;
  padding:8px;
  border-radius:8px;
  margin:8px 0;
}

.player img {
  width:40px;
  height:40px;
  border-radius:6px;
  border:2px solid gold;
}

.points {
  margin-left:auto;
  font-weight:bold;
}
/* CATEGORY BUTTONS */
#categories a {
  display:inline-block;
  margin:10px;
  padding:10px;
  border-radius:8px;
  text-decoration:none;
  background:#2a2d36;
  color:white;
}

#categories a:hover {
  background:#3a3d46;
}

#categories a.active {
  background:#ffd700;
  color:black;
}
</style>
